name: Compile Card DB

on:
  push:
  workflow_dispatch:

jobs:
  compile_card_db:
    runs-on: ubuntu-latest
    outputs:
      cardb_target: ${{ steps.compare.outputs.cardb_target }}
      source_pr_number: ${{ steps.resolve-pr.outputs.source_pr_number }}
      base_branch: ${{ steps.resolve-pr.outputs.base_branch }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve PR context
        id: resolve-pr
        uses: actions/github-script@v8
        with:
          script: |
            const eventName = context.eventName;
            const payload = context.payload;
            const defaultBranch = payload.repository?.default_branch || '';

            if (eventName === 'pull_request') {
              const prNumber = String(payload.pull_request?.number || '');
              const baseBranch = String(payload.pull_request?.base?.ref || defaultBranch);
              core.setOutput('source_pr_number', prNumber);
              core.setOutput('base_branch', baseBranch);
              return;
            }

            if (eventName === 'push') {
              const branch = (payload.ref || '').replace('refs/heads/', '');
              const head = `${context.repo.owner}:${branch}`;
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head,
                per_page: 1,
              });

              if (prs.length > 0) {
                const prNumber = String(prs[0].number);
                const baseBranch = String(prs[0].base.ref || defaultBranch);
                core.setOutput('source_pr_number', prNumber);
                core.setOutput('base_branch', baseBranch);
                return;
              }
            }

            core.setOutput('source_pr_number', '');
            core.setOutput('base_branch', defaultBranch);
      - uses: actions/setup-python@v6
        with:
          python-version: 3.9
      - run: |
          pip install -r requirements.txt
          pip install -r dev-requirements.txt
          pip install .
      - name: Update Languages
        run: doit update_languages
      - run: |
          pip install .
      - name: Install PyICU
        run: |
          sudo apt update
          sudo apt install python3-icu
      - name: test generation with compiled Languages
        run: pytest -k "test_languages"
      - name: Fetch target branch for comparison
        if: ${{ steps.resolve-pr.outputs.source_pr_number != '' }}
        run: git fetch --no-tags origin "${{ steps.resolve-pr.outputs.base_branch }}"
      - name: Compare compiled card DB to target branch
        id: compare
        shell: bash
        run: |
          if [ -z "${{ steps.resolve-pr.outputs.source_pr_number }}" ]; then
            echo "cardb_target=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "origin/${{ steps.resolve-pr.outputs.base_branch }}" -- src/domdiv/card_db/; then
            echo "cardb_target=false" >> "$GITHUB_OUTPUT"
          else
            echo "cardb_target=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload compiled card DB artifact
        uses: actions/upload-artifact@v6
        if: steps.compare.outputs.cardb_target == 'true'
        with:
          name: compiled-card-db
          path: src/domdiv/card_db
  make_card_db_pr:
    needs: compile_card_db
    if: ${{ needs.compile_card_db.outputs.source_pr_number != '' }}
    uses: ./.github/workflows/make_card_db_pr.yml
    secrets: inherit
    with:
      source_pr_number: ${{ needs.compile_card_db.outputs.source_pr_number }}
      base_branch: ${{ needs.compile_card_db.outputs.base_branch }}
      cardb_target: ${{ needs.compile_card_db.outputs.cardb_target }}
