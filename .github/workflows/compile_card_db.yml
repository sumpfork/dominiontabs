name: Compile Card DB

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
  workflow_dispatch:

jobs:
  compile_card_db:
    runs-on: ubuntu-latest
    outputs:
      cardb_target: ${{ steps.filter.outputs.cardb_target }}
      source_pr_number: ${{ steps.resolve-pr.outputs.source_pr_number }}
      base_branch: ${{ steps.resolve-pr.outputs.base_branch }}
    steps:
      - uses: actions/checkout@v6
      - name: Debug event context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "event_number=${{ github.event.number }}"
          echo "pull_request_number=${{ github.event.pull_request.number }}"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          event_path = Path(os.environ["GITHUB_EVENT_PATH"])
          payload = json.loads(event_path.read_text())
          summary = {
              "action": payload.get("action"),
              "number": payload.get("number"),
              "pull_request_number": (payload.get("pull_request") or {}).get("number"),
              "pull_request_head_ref": ((payload.get("pull_request") or {}).get("head") or {}).get("ref"),
              "pull_request_base_ref": ((payload.get("pull_request") or {}).get("base") or {}).get("ref"),
              "repository_default_branch": (payload.get("repository") or {}).get("default_branch"),
              "keys": sorted(payload.keys()),
          }
          print(json.dumps(summary, indent=2))
          PY
      - name: Resolve PR context
        id: resolve-pr
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |
            const eventName = context.eventName;
            const payload = context.payload;
            const defaultBranch = payload.repository?.default_branch || '';

            if (eventName === 'pull_request') {
              const prNumber = String(payload.pull_request?.number || '');
              const baseBranch = String(payload.pull_request?.base?.ref || defaultBranch);
              core.setOutput('source_pr_number', prNumber);
              core.setOutput('base_branch', baseBranch);
              return `pull_request:${prNumber}:${baseBranch}`;
            }

            if (eventName === 'push') {
              const branch = (payload.ref || '').replace('refs/heads/', '');
              const head = `${context.repo.owner}:${branch}`;
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head,
                per_page: 1,
              });

              if (prs.length > 0) {
                const prNumber = String(prs[0].number);
                const baseBranch = String(prs[0].base.ref || defaultBranch);
                core.setOutput('source_pr_number', prNumber);
                core.setOutput('base_branch', baseBranch);
                return `push_pr:${prNumber}:${baseBranch}`;
              }
            }

            core.setOutput('source_pr_number', '');
            core.setOutput('base_branch', defaultBranch);
            return `no_pr:${defaultBranch}`;
      - uses: actions/setup-python@v6
        with:
          python-version: 3.9
      - run: |
          pip install -r requirements.txt
          pip install -r dev-requirements.txt
          pip install .
      - name: Update Languages
        run: doit update_languages
      - run: |
          pip install .
      - name: Install PyICU
        run: |
          sudo apt update
          sudo apt install python3-icu
      - name: test generation with compiled Languages
        run: pytest -k "test_languages"
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: HEAD
          filters: |
            cardb_target:
              - src/domdiv/card_db/**
      - name: Upload compiled card DB artifact
        uses: actions/upload-artifact@v6
        if: steps.filter.outputs.cardb_target == 'true'
        with:
          name: compiled-card-db
          path: src/domdiv/card_db
  make_card_db_pr:
    needs: compile_card_db
    if: ${{ needs.compile_card_db.outputs.source_pr_number != '' }}
    uses: ./.github/workflows/make_card_db_pr.yml
    secrets: inherit
    with:
      source_pr_number: ${{ needs.compile_card_db.outputs.source_pr_number }}
      base_branch: ${{ needs.compile_card_db.outputs.base_branch }}
      cardb_target: ${{ needs.compile_card_db.outputs.cardb_target }}
