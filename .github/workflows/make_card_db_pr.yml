name: Make Card DB PR

on:
  workflow_call:
    inputs:
      source_pr_number:
        required: true
        type: string
      base_branch:
        required: true
        type: string
      cardb_target:
        required: true
        type: string

jobs:
  make_pr:
    runs-on: ubuntu-latest
    env:
      AUTO_PR_BRANCH: auto-card-db/source-pr-${{ inputs.source_pr_number }}
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base_branch }}
      - name: Close stale auto PRs if no card DB changes
        if: ${{ inputs.cardb_target != 'true' }}
        uses: actions/github-script@v8
        env:
          SOURCE_PR_NUMBER: ${{ inputs.source_pr_number }}
        with:
          script: |
            const sourcePrNumber = Number(process.env.SOURCE_PR_NUMBER);
            const targetTitle = `Auto Card DB compile for #${sourcePrNumber}`;
            let page = 1;
            let openAutoPrs = [];

            while (true) {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
                page,
              });

              if (prs.length === 0) {
                break;
              }

              openAutoPrs = openAutoPrs.concat(prs.filter((pr) => pr.title === targetTitle));
              page += 1;
            }

            if (openAutoPrs.length === 0) {
              console.log(`No open auto PR found for title: ${targetTitle}`);
              return;
            }

            for (const pr of openAutoPrs) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed',
              });
              console.log(`Closed stale auto PR #${pr.number}`);
            }
      - name: Download compiled card DB
        if: ${{ inputs.cardb_target == 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: compiled-card-db
          path: .
      - name: Debug auto PR branch
        run: |
          echo "source_pr_number=${{ inputs.source_pr_number }}"
          echo "base_branch=${{ inputs.base_branch }}"
          echo "cardb_target=${{ inputs.cardb_target }}"
          echo "auto_pr_branch=${AUTO_PR_BRANCH}"
      - name: Make PR
        id: make-pr
        if: ${{ inputs.cardb_target == 'true' }}
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ env.AUTO_PR_BRANCH }}
          title: 'Auto Card DB compile for #${{ inputs.source_pr_number }}'
          body: |
            Auto-generate package card DB to from source card DB for PR #${{ inputs.source_pr_number }}
          delete-branch: true
          reviewers: sumpfork
          assignees: sumpfork
          add-paths: |
            src/domdiv/card_db/
      - name: Comment on PR
        if: ${{ inputs.cardb_target == 'true' }}
        uses: actions/github-script@v8
        env:
          SOURCE_PR_NUMBER: ${{ inputs.source_pr_number }}
          THIS_PR_NUMBER: ${{ steps.make-pr.outputs.pull-request-number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { SOURCE_PR_NUMBER, THIS_PR_NUMBER } = process.env;
            console.log(`source PR number: ${SOURCE_PR_NUMBER}`);
            console.log(`new PR number: ${THIS_PR_NUMBER}`);

            if (!SOURCE_PR_NUMBER) {
              core.setFailed('SOURCE_PR_NUMBER was empty in comment step.');
              return;
            }

            const issue_number = Number(SOURCE_PR_NUMBER);
            if (!Number.isInteger(issue_number) || issue_number <= 0) {
              core.setFailed(`Invalid SOURCE_PR_NUMBER in comment step: ${SOURCE_PR_NUMBER}`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: `It seems compiling the card DB on this PR produced changes.\n` +
                    `Ideally, please run "doit update-language" yourself on this PR and check in the results.\n` +
                    `Otherwise, PR #${THIS_PR_NUMBER} has the necessary (but unreviewed) changes.\n`
            });
